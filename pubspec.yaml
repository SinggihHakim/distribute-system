name: pakjoni_project
description: "Kasir Pintar - Aplikasi manajemen distribusi dan laporan penjualan"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend & Auth
  supabase_flutter: ^2.5.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.0.0

  # UI & Fonts
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.19.0

  # Export Excel
  excel: ^4.0.6
  share_plus: ^11.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
